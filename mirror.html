<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Your Mirror | ImignarX</title>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <h1 data-translate-page="mirror" data-translate-key="title">Your Mirror</h1>
        <p class="subtitle" data-translate-page="mirror" data-translate-key="subtitle">A playful daily summary from today’s check‑in.</p>
      </div>

      <p id="welcome" class="welcome">Welcome, friend.</p>

      <div class="result-grid">
        <div class="result-card">
          <div class="result-label" data-translate-page="mirror" data-translate-key="mindWeatherLabel">Mind Weather</div>
          <div id="mindWeatherValue" class="result-value"></div>
        </div>
        <div class="result-card">
          <div class="result-label" data-translate-page="mirror" data-translate-key="archetypeLabel">Archetype</div>
          <div id="archetypeValue" class="result-value"></div>
          <div
          id="rarityValue"
          class="small-text">
          🏆 Rarity
          </div>
        <div class="result-card full-width">
          <div class="result-label" data-translate-page="mirror" data-translate-key="observationLabel">Daily Observation</div>
          <div id="observationValue" class="result-value"></div>
        </div>
        <div class="result-card full-width">
          <div class="result-label" data-translate-page="mirror" data-translate-key="nightCompanionLabel">Night Companion</div>
          <div id="nightCompanionValue" class="result-value"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header" data-translate-page="mirror" data-translate-key="notificationsLabel">Notifications</div>
        <label class="toggle-switch">
          <input type="checkbox" id="notificationToggle" />
          <span class="slider"></span>
          <span id="notificationLabel">Daily reminders are ON</span>
        </label>
        <p id="notificationDetail" class="small-text">You’ll get gentle reminders while you visit the app.</p>
      </div>

      <div class="section">
        <div class="section-header" data-translate-page="mirror" data-translate-key="weeklyLabel">Weekly report</div>
        <div id="weeklyReport" class="insight">A short report will appear here after a few sessions.</div>
        <div id="weeklyTrend" class="insight small-text"></div>
      </div>

      <div class="button-row">
        <button id="returnToQuestions" class="btn primary" data-translate-page="mirror" data-translate-key="startAgainButton">Review today again</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>

const name =
localStorage.getItem("imignarxName") || "Friend";

document.getElementById("welcome").textContent =
`Welcome, ${name.split(" ")[0]}.`;

const result =
JSON.parse(
localStorage.getItem("imignarxLatestResult")
);

if(result){

document.getElementById(
"mindWeatherValue"
).textContent =
result.weather || "🌤️ Unknown";

document.getElementById(
"archetypeValue"
).textContent =
result.archetype || "🦝 Explorer";
document.getElementById(
"rarityValue"
).textContent =
"🏆 Rarity: " +
(result.rarity || "Unknown");

document.getElementById(
"observationValue"
).textContent =
result.observation || "";

document.getElementById(
"nightCompanionValue"
).textContent =
result.companion || "";

}else{

document.getElementById(
"mindWeatherValue"
).textContent =
"Take today's quiz first";

document.getElementById(
"archetypeValue"
).textContent =
"—";

document.getElementById(
"observationValue"
).textContent =
"No result found yet.";

document.getElementById(
"nightCompanionValue"
).textContent =
"Complete Daily Decode.";

}

const notificationToggle =
document.getElementById(
"notificationToggle"
);

notificationToggle.addEventListener(
"change",
()=>{

if(
notificationToggle.checked &&
window.Notification &&
Notification.permission !== "granted"
){

Notification.requestPermission();

}

}
);

document
.getElementById(
"returnToQuestions"
)
.addEventListener(
"click",
()=>{

window.location.href =
"focus.html";

}
);

</script>

</body>
</html>
