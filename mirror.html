<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Your Mirror | ImignarX</title>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <h1 data-translate-page="mirror" data-translate-key="title">Your Mirror</h1>
        <p class="subtitle" data-translate-page="mirror" data-translate-key="subtitle">A playful daily summary from today’s check‑in.</p>
      </div>

      <p id="welcome" class="welcome">Welcome, friend.</p>

      <div class="result-grid">
        <div class="result-card">
          <div class="result-label" data-translate-page="mirror" data-translate-key="mindWeatherLabel">Mind Weather</div>
          <div id="mindWeatherValue" class="result-value"></div>
        </div>
        <div class="result-card">
          <div class="result-label" data-translate-page="mirror" data-translate-key="archetypeLabel">Archetype</div>
          <div id="archetypeValue" class="result-value"></div>
        </div>
        <div class="result-card full-width">
          <div class="result-label" data-translate-page="mirror" data-translate-key="observationLabel">Daily Observation</div>
          <div id="observationValue" class="result-value"></div>
        </div>
        <div class="result-card full-width">
          <div class="result-label" data-translate-page="mirror" data-translate-key="nightCompanionLabel">Night Companion</div>
          <div id="nightCompanionValue" class="result-value"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header" data-translate-page="mirror" data-translate-key="notificationsLabel">Notifications</div>
        <label class="toggle-switch">
          <input type="checkbox" id="notificationToggle" />
          <span class="slider"></span>
          <span id="notificationLabel">Daily reminders are ON</span>
        </label>
        <p id="notificationDetail" class="small-text">You’ll get gentle reminders while you visit the app.</p>
      </div>

      <div class="section">
        <div class="section-header" data-translate-page="mirror" data-translate-key="weeklyLabel">Weekly report</div>
        <div id="weeklyReport" class="insight">A short report will appear here after a few sessions.</div>
        <div id="weeklyTrend" class="insight small-text"></div>
      </div>

      <div class="button-row">
        <button id="returnToQuestions" class="btn primary" data-translate-page="mirror" data-translate-key="startAgainButton">Review today again</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const STORAGE_KEY = 'imignarxDailySessions';
    const sessionDate = new Date().toISOString().slice(0, 10);
    const name = localStorage.getItem('imignarxName');
    const dob = localStorage.getItem('imignarxDob');

    if (!name || !dob) {
      window.location.href = 'index.html';
    }

    const firstName = (name || '').split(' ')[0] || 'friend';
    document.getElementById('welcome').textContent = `Welcome, ${firstName}.`;

    function loadSessions() {
      const stored = localStorage.getItem(STORAGE_KEY);
      try {
        return stored ? JSON.parse(stored) : {};
      } catch (e) {
        return {};
      }
    }

    function savePreference(key, value) {
      localStorage.setItem(key, value);
    }

    function loadNotificationsEnabled() {
      const value = localStorage.getItem('imignarxNotificationsEnabled');
      return value === null ? true : value === 'true';
    }

    function updateNotificationUI(enabled) {
      const label = document.getElementById('notificationLabel');
      label.textContent = enabled ? translate('mirror', 'notificationOn') : translate('mirror', 'notificationOff');
    }

    function scheduleNotification(message) {
      const card = document.createElement('div');
      card.className = 'notification-card';
      card.textContent = message;
      document.body.appendChild(card);
      setTimeout(() => card.remove(), 6000);

      if (window.Notification && Notification.permission === 'granted') {
        new Notification(message);
      }
    }

    function maybeStartNotifications(enabled) {
      const messages = [
        { hour: 9, text: 'New absurdity available.' },
        { hour: 14, text: 'Human status check required.' },
        { hour: 20, text: 'Your daily debrief is waiting.' },
      ];
      const now = new Date();
      messages.forEach((item) => {
        const fireAt = new Date(now);
        fireAt.setHours(item.hour, 0, 0, 0);
        if (fireAt.getTime() <= now.getTime()) {
          fireAt.setDate(fireAt.getDate() + 1);
        }
        const delay = fireAt.getTime() - now.getTime();
        if (enabled) {
          setTimeout(() => scheduleNotification(item.text), delay);
        }
      });
    }

    function getWeeklyReport(sessions) {
      const recent = Object.values(sessions)
        .filter((session) => session.finished)
        .sort((a, b) => b.date.localeCompare(a.date))
        .slice(0, 7);
      if (!recent.length) {
        return null;
      }

      const counts = recent.reduce((acc, session) => {
        acc[session.archetype] = (acc[session.archetype] || 0) + 1;
        return acc;
      }, {});

      const total = recent.length;
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const reportLines = sorted.map(([label, count]) => `${Math.round((count / total) * 100)}% ${label}`);
      const topTrend = sorted[0];
      const trendText = topTrend ? `Your strongest trend this week is ${topTrend[0]}.` : '';
      return { reportLines, trendText };
    }

    function renderMirror(session) {
      document.getElementById('mindWeatherValue').textContent = session.mindWeather;
      document.getElementById('archetypeValue').textContent = session.archetype;
      document.getElementById('observationValue').textContent = session.observation;
      document.getElementById('nightCompanionValue').textContent = session.nightCompanion;
    }

    function initialize() {
      const sessions = loadSessions();
      const session = sessions[sessionDate];
      if (!session || !session.finished) {
        document.getElementById('weeklyReport').textContent = translate('mirror', 'noSession');
        document.getElementById('weeklyTrend').textContent = '';
        return;
      }

      renderMirror(session);
      const report = getWeeklyReport(sessions);
      if (report) {
        document.getElementById('weeklyReport').textContent = report.reportLines.join('\n');
        document.getElementById('weeklyTrend').textContent = report.trendText;
      }
    }

    const notificationToggle = document.getElementById('notificationToggle');
    const notificationsEnabled = loadNotificationsEnabled();
    notificationToggle.checked = notificationsEnabled;
    updateNotificationUI(notificationsEnabled);
    maybeStartNotifications(notificationsEnabled);

    notificationToggle.addEventListener('change', () => {
      const enabled = notificationToggle.checked;
      savePreference('imignarxNotificationsEnabled', enabled.toString());
      updateNotificationUI(enabled);
      if (enabled && window.Notification && Notification.permission !== 'granted') {
        Notification.requestPermission().then((result) => {
          if (result === 'granted') {
            scheduleNotification('Notification permission set. Your daily reminders are ready.');
          }
        });
      }
    });

    document.getElementById('returnToQuestions').addEventListener('click', () => {
      window.location.href = 'focus.html';
    });

    initialize();
  </script>
</body>
</html>
