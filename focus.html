<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="style.css">
<title>🧠 Daily Decode | ImignarX</title>
</head>

<body>

<div class="container">
<div class="card">

<div class="brand">
<h1>🧠 Daily Decode</h1>
<p class="subtitle">Discover what creature is secretly operating your brain today.</p>
</div>

<div id="quizContainer">

<div class="progress-row">
<div id="questionCounter" class="progress-label">Question 1/∞</div>
<div id="progressPercent" class="progress-percent">∞</div>
</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div id="questionCard" class="question-text">🃏 TAP TO REVEAL</div>

<div id="questionAd" class="question-ad">
🏺 Sponsored Discovery<br><br>
Ancient minds knew: small habits become giant destinies.
</div>

<div id="optionsContainer"></div>

<div class="controls">
<button id="skipButton" class="btn secondary">Skip</button>
<button id="nextButton" class="btn primary">Next →</button>
</div>

<p id="answerFeedback"></p>

</div>

<div id="resultContainer" class="hidden">

<div class="collectible-card">
<div id="resultArchetype">🦝 Side Quest Collector</div>
<div id="resultWeather">⛅ Mild Chaos</div>
</div>

<br>

<button id="continueAdventure" class="primary-button">🔥 Continue Adventure</button>
</div>

</div>
</div>

<script>

const QUESTIONS = [
{ question:"Your brain's transportation today?", options:[
{ text:"🚀 Rocket", type:"momentum" },
{ text:"🚗 Sedan", type:"owl" },
{ text:"🛺 Rickshaw", type:"delayer" },
{ text:"🦄 Unicorn", type:"sidequest" }
]},

{ question:"FIFA 2026 final moment feels like?", options:[
{ text:"⚽ Last-minute goal", type:"momentum" },
{ text:"🧠 Tactical masterclass", type:"owl" },
{ text:"🎲 Chaos goal", type:"sidequest" },
{ text:"😴 Extra time", type:"delayer" }
]},

{ question:"World Cup mindset?", options:[
{ text:"🔥 Attack", type:"momentum" },
{ text:"🧠 Strategy", type:"owl" },
{ text:"🎪 Tricks", type:"sidequest" },
{ text:"🛌 Defense", type:"delayer" }
]},

{ question:"Energy today?", options:[
{ text:"⚡ High", type:"momentum" },
{ text:"☕ Coffee", type:"squirrel" },
{ text:"😴 Low", type:"delayer" },
{ text:"🧘 Balanced", type:"owl" }
]},

{ question:"What distracts you?", options:[
{ text:"📱 Phone", type:"squirrel" },
{ text:"🌍 Curiosity", type:"sidequest" },
{ text:"🛌 Comfort", type:"delayer" },
{ text:"📊 Overthinking", type:"owl" }
]},

{ question:"Mood soundtrack?", options:[
{ text:"🔥 Action", type:"momentum" },
{ text:"🎻 Deep thinking", type:"owl" },
{ text:"🎪 Chaos", type:"sidequest" },
{ text:"😴 Sleep", type:"delayer" }
]},

{ question:"Friends describe you?", options:[
{ text:"🚀 Fast", type:"momentum" },
{ text:"🧠 Smart", type:"owl" },
{ text:"🦝 Random", type:"sidequest" },
{ text:"🦥 Chill", type:"delayer" }
]}
];

let currentQuestion = 0;
let selectedAnswer = null;
const scores = { momentum:0, owl:0, sidequest:0, delayer:0, squirrel:0 };

const questionText = document.getElementById("questionCard");
const optionsContainer = document.getElementById("optionsContainer");
const questionCounter = document.getElementById("questionCounter");
const progressFill = document.getElementById("progressFill");
const progressPercent = document.getElementById("progressPercent");

let revealed = false;

function renderQuestion(){

currentQuestion = Math.floor(Math.random() * QUESTIONS.length);
const q = QUESTIONS[currentQuestion];

revealed = false;
selectedAnswer = null;

questionText.textContent = "🃏 TAP TO REVEAL";

const ad = document.getElementById("questionAd");
if(ad) ad.style.display = "block";

questionCounter.textContent = "Question " + (Math.floor(Math.random()*10)+1) + "/∞";
progressPercent.textContent = "∞";

optionsContainer.innerHTML = "";

q.options.forEach(opt=>{
const btn = document.createElement("button");
btn.className = "option-card";
btn.textContent = opt.text;

btn.onclick = ()=>{
document.querySelectorAll(".option-card").forEach(c=>c.classList.remove("selected"));
btn.classList.add("selected");
selectedAnswer = opt;
};

optionsContainer.appendChild(btn);
});
}

questionText.addEventListener("click",()=>{

if(revealed) return;
revealed = true;

questionText.textContent = QUESTIONS[currentQuestion].question;

document.getElementById("questionAd").style.display = "none";
});

document.getElementById("nextButton").onclick = ()=>{

if(!selectedAnswer) return;

scores[selectedAnswer.type]++;

renderQuestion();
};

document.getElementById("skipButton").onclick = ()=>{

renderQuestion();
};

document.getElementById("continueAdventure").onclick = ()=>{

document.getElementById("resultContainer").classList.add("hidden");
document.getElementById("quizContainer").classList.remove("hidden");

renderQuestion();
};

renderQuestion();

</script>

</body>
</html>
