<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="style.css">
<title>🧠 Daily Decode | ImignarX</title>
</head>

<body>

<div class="container">
<div class="card">

<div class="brand">
<h1>🧠 Daily Decode</h1>
<p class="subtitle">Discover what creature is secretly operating your brain today.</p>
</div>

<div id="quizContainer">

<div class="progress-row">
<div id="questionCounter" class="progress-label">Question 1/∞</div>
<div id="progressPercent" class="progress-percent">∞</div>
</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div id="questionCard" class="question-text">🃏 TAP TO REVEAL</div>

<div id="questionAd" class="question-ad">
🏺 Sponsored Discovery<br><br>
Ancient minds knew: small habits become giant destinies.
</div>

<div id="optionsContainer"></div>

<div class="controls">
<button id="skipButton" class="btn secondary">Skip</button>
<button id="nextButton" class="btn primary">Next →</button>
</div>

</div>

<div id="resultContainer" class="hidden">

<div class="collectible-card">
<div id="resultArchetype">🦝 Side Quest Collector</div>
<div id="resultWeather">⛅ Mild Chaos</div>
</div>

<br>

<button id="continueAdventure" class="primary-button">🔥 Continue Adventure</button>

</div>

</div>
</div>

<script>

/* ================= SAFE QUESTION BANK ================= */

const QUESTIONS = [
{
question:"Your brain's transportation today?",
options:[
{ text:"🚀 Rocket", type:"momentum" },
{ text:"🚗 Sedan", type:"owl" },
{ text:"🛺 Rickshaw", type:"delayer" },
{ text:"🦄 Unicorn", type:"sidequest" }
]
},
{
question:"FIFA 2026 final moment?",
options:[
{ text:"⚽ Last minute goal", type:"momentum" },
{ text:"🧠 Tactical play", type:"owl" },
{ text:"🎲 Chaos goal", type:"sidequest" },
{ text:"😴 Extra time", type:"delayer" }
]
},
{
question:"Energy today?",
options:[
{ text:"⚡ High", type:"momentum" },
{ text:"☕ Coffee", type:"squirrel" },
{ text:"😴 Low", type:"delayer" },
{ text:"🧘 Balanced", type:"owl" }
]
},
{
question:"What distracts you?",
options:[
{ text:"📱 Phone", type:"squirrel" },
{ text:"🌍 Curiosity", type:"sidequest" },
{ text:"🛌 Comfort", type:"delayer" },
{ text:"📊 Overthinking", type:"owl" }
]
},
{
question:"Mood today?",
options:[
{ text:"🔥 Action", type:"momentum" },
{ text:"🎪 Chaos", type:"sidequest" },
{ text:"😴 Sleepy", type:"delayer" },
{ text:"🧠 Focused", type:"owl" }
]
}
];

/* ================= STATE ================= */

let selectedAnswer = null;
let revealed = false;

const scores = {
momentum:0,
owl:0,
sidequest:0,
delayer:0,
squirrel:0
};

/* ================= ELEMENTS ================= */

const qCard = document.getElementById("questionCard");
const optionsBox = document.getElementById("optionsContainer");
const counter = document.getElementById("questionCounter");
const percent = document.getElementById("progressPercent");

/* ================= ENGINE ================= */

function renderQuestion(){

const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];

selectedAnswer = null;
revealed = false;

qCard.textContent = "🃏 TAP TO REVEAL";

const ad = document.getElementById("questionAd");
if(ad) ad.style.display = "block";

counter.textContent = `Question ${Math.floor(Math.random()*10)+1}/∞`;
percent.textContent = "∞";

optionsBox.innerHTML = "";

q.options.forEach(o=>{
const btn = document.createElement("button");
btn.className = "option-card";
btn.textContent = o.text;

btn.onclick = ()=>{
document.querySelectorAll(".option-card")
.forEach(x=>x.classList.remove("selected"));

btn.classList.add("selected");
selectedAnswer = o;
};

optionsBox.appendChild(btn);
});
}

/* ================= REVEAL ================= */

qCard.onclick = ()=>{

if(revealed) return;
revealed = true;

// IMPORTANT FIX: use SAME question, not new random one
const currentQ = qCard.dataset.q || QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)].question;

qCard.textContent = currentQ;

const ad = document.getElementById("questionAd");
if(ad) ad.style.display = "none";
};

/* ================= BUTTONS ================= */

document.getElementById("nextButton").onclick = ()=>{
if(!selectedAnswer) return;
scores[selectedAnswer.type]++;

renderQuestion();
};

document.getElementById("skipButton").onclick = ()=>{
renderQuestion();
};

/* ================= CONTINUE ================= */

document.getElementById("continueAdventure").onclick = ()=>{
document.getElementById("resultContainer").classList.add("hidden");
document.getElementById("quizContainer").classList.remove("hidden");

renderQuestion();
};

/* ================= INIT ================= */

renderQuestion();

</script>

</body>
</html>
