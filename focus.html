<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="style.css">
<title>🧠 Daily Decode | ImignarX</title>
</head>

<body>

<div class="container">
<div class="card">

<div class="brand">
<h1>🧠 Daily Decode</h1>
<p class="subtitle">Discover what creature is secretly operating your brain today.</p>
</div>

<div id="quizContainer">

<div class="progress-row">
<div id="questionCounter" class="progress-label">Question 1/∞</div>
<div id="progressPercent" class="progress-percent">∞</div>
</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div id="questionCard" class="question-text">🃏 TAP TO REVEAL</div>

<div id="questionAd" class="question-ad">
🏺 Sponsored Discovery<br><br>
Ancient minds knew: small habits become giant destinies.
</div>

<div id="optionsContainer"></div>

<div class="controls">
<button id="skipButton" class="btn secondary">Skip</button>
<button id="nextButton" class="btn primary">Next →</button>
</div>

</div>

<div id="resultContainer" class="hidden">

<div class="collectible-card">
<div id="resultArchetype">🧠 Your Mind Result</div>
<div id="resultWeather">✨ Decoded State</div>
</div>

<br>

<button id="continueAdventure" class="primary-button">🔥 Continue Adventure</button>

</div>

</div>
</div>

<script>

const QUESTIONS = [
{
question:"Your brain mode today?",
options:[
{ text:"🚀 Fast action", type:"momentum" },
{ text:"🧠 Deep thinking", type:"owl" },
{ text:"🎲 Chaos mode", type:"sidequest" },
{ text:"🛌 Delay everything", type:"delayer" }
]
},
{
question:"FIFA 2026 moment reaction?",
options:[
{ text:"⚽ Last minute goal", type:"momentum" },
{ text:"📊 Tactical breakdown", type:"owl" },
{ text:"😂 Meme instantly", type:"sidequest" },
{ text:"😴 Didn’t watch", type:"delayer" }
]
},
{
question:"Energy level today?",
options:[
{ text:"⚡ High", type:"momentum" },
{ text:"☕ Coffee mode", type:"squirrel" },
{ text:"🌫️ Low", type:"delayer" },
{ text:"🧘 Balanced", type:"owl" }
]
},
{
question:"What distracts you most?",
options:[
{ text:"📱 Phone", type:"squirrel" },
{ text:"🌍 Curiosity", type:"sidequest" },
{ text:"🛌 Comfort", type:"delayer" },
{ text:"📊 Overthinking", type:"owl" }
]
},
{
question:"Your focus style?",
options:[
{ text:"🔥 Action", type:"momentum" },
{ text:"🎪 Chaos", type:"sidequest" },
{ text:"😴 Slow", type:"delayer" },
{ text:"🧠 Sharp", type:"owl" }
]
}
];

let selectedAnswer = null;
let recent = [];

const scores = {
momentum:0,
owl:0,
sidequest:0,
delayer:0,
squirrel:0
};

const qCard = document.getElementById("questionCard");
const optionsBox = document.getElementById("optionsContainer");
const counter = document.getElementById("questionCounter");
const percent = document.getElementById("progressPercent");
const ad = document.getElementById("questionAd");

let revealed = false;

function getQuestion(){
if(recent.length === QUESTIONS.length) recent = [];

let index;
do {
index = Math.floor(Math.random() * QUESTIONS.length);
} while(recent.includes(index));

recent.push(index);
return QUESTIONS[index];
}

function renderQuestion(){

const q = getQuestion();

selectedAnswer = null;
revealed = false;

qCard.textContent = "🃏 TAP TO REVEAL";
if(ad) ad.style.display = "block";

counter.textContent = `Question ${Math.floor(Math.random()*10)+1}/∞`;
percent.textContent = "∞";

optionsBox.innerHTML = "";

q.options.forEach(o=>{
const b = document.createElement("button");
b.className = "option-card";
b.textContent = o.text;

b.onclick = ()=>{
document.querySelectorAll(".option-card")
.forEach(x=>x.classList.remove("selected"));
b.classList.add("selected");
selectedAnswer = o;
};

optionsBox.appendChild(b);
});
}

qCard.onclick = ()=>{
if(revealed) return;
revealed = true;

qCard.textContent =
QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)].question;

if(ad) ad.style.display = "none";
};

document.getElementById("nextButton").onclick = ()=>{
if(!selectedAnswer) return;
scores[selectedAnswer.type]++;
renderQuestion();
};

document.getElementById("skipButton").onclick = ()=>{
renderQuestion();
};

document.getElementById("continueAdventure").onclick = ()=>{
document.getElementById("resultContainer").classList.add("hidden");
document.getElementById("quizContainer").classList.remove("hidden");
renderQuestion();
};

renderQuestion();

</script>

</body>
</html>
