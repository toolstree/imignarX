        <button id="continueMirror" class="btn primary" type="button" data-translate-page="focus" data-translate-key="continueButton">See my mirror</button>

    function loadSessions() {
      const stored = localStorage.getItem(STORAGE_KEY);
      try {
        return stored ? JSON.parse(stored) : {};
      } catch (e) {
        return {};
      }
    }

    function saveSessions(sessions) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function seedFromString(value) {
      let seed = 0;
      for (let i = 0; i < value.length; i += 1) {
        seed = (seed * 31 + value.charCodeAt(i)) % 2147483647;
      }
      return seed;
    }

    function randomFromSeed(seed) {
      return (seed = (seed * 16807) % 2147483647) / 2147483647;
    }

    function getQuestionIndices(dateString) {
      const seed = seedFromString(dateString);
      const indices = questionBank.map((_, index) => index);
      let currentSeed = seed;
      for (let i = indices.length - 1; i > 0; i -= 1) {
        currentSeed = randomFromSeed(currentSeed) * 2147483647;
        const j = Math.floor((currentSeed / 2147483647) * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return indices.slice(0, QUESTIONS_PER_DAY);
    }

    function createSession() {
      return {
        date: today,
        questionIndices: getQuestionIndices(today),
        answers: Array(QUESTIONS_PER_DAY).fill(''),
        currentIndex: 0,
        finished: false,
        mindWeather: '',
        archetype: '',
        observation: '',
        nightCompanion: '',
      };
    }

    function getSession() {
      const sessions = loadSessions();
      if (sessions[today]) {
        return sessions[today];
      }
      const session = createSession();
      sessions[today] = session;
      saveSessions(sessions);
      return session;
    }

    function saveSession(session) {
      const sessions = loadSessions();
      sessions[session.date] = session;
      saveSessions(sessions);
    }

    function getAnswerText(index) {
      return questionBank[index] || '';
    }

    function updateProgress(session) {
      const questionProgress = document.getElementById('questionProgress');
      const progressPercent = document.getElementById('progressPercent');
      const progressFill = document.getElementById('progressFill');
      const questionNumber = Math.min(session.currentIndex + 1, QUESTIONS_PER_DAY);
      questionProgress.textContent = `Question ${questionNumber}/${QUESTIONS_PER_DAY}`;
      const percent = Math.round((questionNumber - 1) / QUESTIONS_PER_DAY * 100);
      progressPercent.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;
    }

    function showQuestion(session) {
      const questionText = document.getElementById('questionText');
      const answerInput = document.getElementById('answerInput');
      const answerFeedback = document.getElementById('answerFeedback');
      const currentQuestionIndex = session.questionIndices[session.currentIndex];
      questionText.textContent = getAnswerText(currentQuestionIndex);
      answerInput.value = session.answers[session.currentIndex] || '';
      answerInput.focus();
      answerFeedback.textContent = '';
      updateProgress(session);
    }

    function makeMindWeather(answers) {
      const combined = answers.join(' ').toLowerCase();
      const patterns = [
        { label: 'Laser Focus', words: ['laser', 'sharp', 'zoned', 'locked', 'focused'] },
        { label: 'Mostly Focused', words: ['mostly', 'steady', 'okay', 'together', 'solid'] },
        { label: 'Mild Chaos', words: ['chaos', 'mess', 'scramble', 'wild', 'spin'] },
        { label: 'Brain Fog', words: ['fog', 'sleepy', 'dazed', 'blur', 'slow'] },
      ];
      const match = patterns.find((pattern) => pattern.words.some((word) => combined.includes(word)));
      return match ? match.label : 'Unexpected Genius';
    }

    function makeArchetype(answers) {
      const combined = answers.join(' ').toLowerCase();
      const archetypes = [
        { label: 'Chaos Manager', words: ['chaos', 'tabs', 'scramble', 'wild'] },
        { label: 'Side Quest Collector', words: ['side quest', 'extra', 'bonus', 'detour'] },
        { label: 'Strategic Panda', words: ['strategy', 'plan', 'think', 'smart'] },
        { label: 'Calm Navigator', words: ['calm', 'steady', 'slow', 'balance'] },
        { label: 'Caffeinated Squirrel', words: ['coffee', 'caffeinated', 'zoom', 'energy'] },
        { label: 'Professional Tab Opener', words: ['tab', 'browser', 'open', 'research'] },
      ];
      const match = archetypes.find((archetype) => archetype.words.some((word) => combined.includes(word)));
      if (match) return match.label;
      return archetypes[Math.floor(Math.random() * archetypes.length)].label;
    }

    function makeObservation(answers) {
      const combined = answers.join(' ').toLowerCase();
      const observations = [
        { text: 'You appear to enjoy collecting tasks more than completing them.', words: ['tabs', 'list', 'extra'] },
        { text: 'Your optimism increases significantly after snacks.', words: ['snack', 'coffee', 'treat'] },
        { text: 'Your brain enjoys side quests.', words: ['side', 'explore', 'extra'] },
        { text: 'You may be one thoughtful shortcut away from a brilliant idea.', words: ['idea', 'thought', 'plan'] },
        { text: 'The most interesting part of today is probably the punctuation on your answer.', words: ['.', '!', '?'] },
      ];
      const matched = observations.find((entry) => entry.words.some((word) => combined.includes(word)));
      if (matched) return matched.text;
      return ['You are uniquely skilled at making even simple days feel interesting.', 'Somewhere between a genius and an adventurer, your day is choosing both.', 'Your brain is more curious than confused today.'][Math.floor(Math.random() * 3)];
    }

    function pickNightCompanion() {
      const messages = [
        'Today’s problems survived: 0',
        'You survived: 100%',
        'The universe has not assigned homework tonight.',
        'Progress invisible to you is still progress.',
        'Rest is productive too.',
        'You made it this far with style and a little bit of chaos.',
        'Tomorrow is allowed to be a softer version of today.',
      ];
      return messages[Math.floor(Math.random() * messages.length)];
    }

    function renderSummary(session) {
      document.getElementById('questionCard').classList.add('hidden');
      document.getElementById('summaryContainer').classList.remove('hidden');
      document.getElementById('mindWeatherValue').textContent = session.mindWeather;
      document.getElementById('archetypeValue').textContent = session.archetype;
      document.getElementById('observationValue').textContent = session.observation;
      document.getElementById('nightCompanionValue').textContent = session.nightCompanion;
    }

    function completeSession(session) {
      session.finished = true;
      session.mindWeather = makeMindWeather(session.answers);
      session.archetype = makeArchetype(session.answers);
      session.observation = makeObservation(session.answers);
      session.nightCompanion = pickNightCompanion();
      saveSession(session);
      renderSummary(session);
    }

    function initialize() {
      const session = getSession();
      const summaryContainer = document.getElementById('summaryContainer');
      const questionCard = document.getElementById('questionCard');

      document.getElementById('answerInput').placeholder = translate('focus', 'answerPlaceholder');
      document.getElementById('nextButton').textContent = translate('focus', 'nextButton');
      document.getElementById('skipButton').textContent = translate('focus', 'skipButton');
      document.getElementById('continueMirror').textContent = translate('focus', 'continueButton');

      if (session.finished) {
        questionCard.classList.add('hidden');
        summaryContainer.classList.remove('hidden');
        renderSummary(session);
        return;
      }

      questionCard.classList.remove('hidden');
      summaryContainer.classList.add('hidden');
      showQuestion(session);

      document.getElementById('nextButton').addEventListener('click', () => {
        const answerInput = document.getElementById('answerInput');
        session.answers[session.currentIndex] = answerInput.value.trim();
        session.currentIndex += 1;
        if (session.currentIndex >= QUESTIONS_PER_DAY) {
          completeSession(session);
          return;
        }
        saveSession(session);
        showQuestion(session);
      });

      document.getElementById('skipButton').addEventListener('click', () => {
        session.answers[session.currentIndex] = '';
        session.currentIndex += 1;
        if (session.currentIndex >= QUESTIONS_PER_DAY) {
          completeSession(session);
          return;
        }
        saveSession(session);
        showQuestion(session);
      });

      document.getElementById('answerInput').addEventListener('input', () => {
        document.getElementById('answerFeedback').textContent = '';
      });

      document.getElementById('continueMirror').addEventListener('click', () => {
        window.location.href = 'mirror.html';
      });
    }

    initialize();
  </script>
