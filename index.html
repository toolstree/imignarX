<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImignarX Onboarding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="brand">
        <div class="brand-mark">IX</div>
        <div>
          <p class="brand-title">ImignarX</p>
          <p class="brand-subtitle">Welcome to your onboarding</p>
        </div>
      </div>

      <form id="onboardingForm" class="form-card">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required />

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required />

        <button type="submit" class="primary-btn">Begin</button>
      </form>

      <p class="note">Your privacy is respected. We only use this information for a better experience.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
