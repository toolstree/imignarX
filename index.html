<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>ImignarX</title>
</head>
<body>

  <div class="container">

    <div class="card">

      <div class="brand">
        <h1>ImignarX</h1>
        <p class="subtitle">
          Know yourself better, one day at a time.
        </p>

        <p class="trust-line">
          Your information stays private and helps personalize your daily reflections.
        </p>
      </div>

      <form id="onboard-form">

        <label>Name</label>
        <input
          type="text"
          id="name"
          placeholder="Enter your name"
          required
        />

        <label>Date of Birth</label>
        <input
          type="date"
          id="dob"
          required
        />

        <label for="language">Preferred Language</label>
        <p id="detected-language" style="margin:6px 0 8px; color: #a6b0c3;">Detected Language: English</p>
        <button id="change-language-btn" type="button" class="small-btn" style="margin-bottom:8px;">Change Language</button>
        <select id="language" name="language" style="display:none;">
          <option value="English">English</option>
          <option value="Hindi">हिन्दी (Hindi)</option>
          <option value="Marathi">मराठी (Marathi)</option>
          <option value="Gujarati">ગુજરાતી (Gujarati)</option>
          <option value="Urdu">اردو (Urdu)</option>
          <option value="Spanish">Español (Spanish)</option>
          <option value="French">Français (French)</option>
          <option value="German">Deutsch (German)</option>
          <option value="Japanese">日本語 (Japanese)</option>
          <option value="Korean">한국어 (Korean)</option>
          <option value="Chinese">中文 (Chinese)</option>
          <option value="Portuguese">Português (Portuguese)</option>
          <option value="Russian">Русский (Russian)</option>
          <option value="Italian">Italiano (Italian)</option>
        </select>

        <button type="submit">
          Begin
        </button>

        <p id="feedback"></p>

      </form>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
