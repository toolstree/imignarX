<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>ImignarX</title>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <h1 data-translate-page="index" data-translate-key="title">ImignarX</h1>
        <p class="subtitle" data-translate-page="index" data-translate-key="subtitle">Know yourself better, one day at a time.</p>
        <p class="trust-line" data-translate-page="index" data-translate-key="trustLine">Your information stays private and helps personalize your daily reflections.</p>
      </div>

      <form id="onboard-form">
        <label data-translate-page="index" data-translate-key="nameLabel">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />

        <label data-translate-page="index" data-translate-key="dobLabel">Date of Birth</label>
        <input type="date" id="dob" required />

        <label for="language" data-translate-page="index" data-translate-key="languageLabel">Preferred Language</label>
        <p id="detected-language" class="detected-language"></p>
        <select id="language" name="language"></select>

        <button type="submit" class="primary-button" data-translate-page="index" data-translate-key="beginButton">Begin</button>
        <p id="feedback" class="feedback"></p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
